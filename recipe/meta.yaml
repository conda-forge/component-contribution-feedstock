{% set name = "component-contribution" %}
{% set version = "0.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 74ba533faec8c0068721e792778e3bb7321562e0e109ebd18ab30e65f578d0e9

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=41
    - setuptools-scm
    - wheel
    - setuptools-git-versioning >=2.0,<3
    - pip
  run:
    - python >={{ python_min }}
    - equilibrator-cache ~=0.6.1
    - path ~=16.7
    - uncertainties ~=3.1

test:
  imports:
    - component_contribution
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://gitlab.com/equilibrator/component-contribution
  summary: A method for estimating the standard reaction Gibbs energy of biochemical reactions
  license: MIT
  license_file: LICENSE
  dev_url: https://gitlab.com/equilibrator/component-contribution

extra:
  recipe-maintainers:
    - eladnoor
    - Midnighter

